name: Deploy VitePress to GitHub Pages

on:
  push:
    branches:
      - main          # 如果默认分支是 master，请改为 master
  workflow_dispatch:   # 允许手动触发

# 设置 GITHUB_TOKEN 的权限
permissions:
  contents: read
  pages: write
  id-token: write

# 只允许一个并发部署
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8   # 可指定 pnpm 版本，或留空使用 package.json 中的 packageManager 字段

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm   # 启用 pnpm 缓存

      - name: Install dependencies
        run: pnpm install

      - name: Build VitePress
        run: pnpm run docs:build   # 确保 package.json 中存在 docs:build 脚本

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist   # VitePress 默认输出目录

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4